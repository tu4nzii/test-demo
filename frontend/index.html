<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玫瑰图分析前端</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; margin: 0; padding: 20px; background-color: #f8f9fa; color: #212529; }
        h1 { text-align: center; color: #343a40; margin-bottom: 30px; }
        .container { display: flex; gap: 20px; max-width: 1500px; margin: 0 auto; }
        .panel { flex: 1; background-color: white; border-radius: 8px; border: 1px solid #dee2e6; padding: 20px; display: flex; flex-direction: column; min-width: 0; }
        .panel h2 { margin-top: 0; color: #495057; border-bottom: 2px solid #e9ecef; padding-bottom: 10px; }
        .image-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; background-color: #f1f3f5; border-radius: 6px; min-height: 200px; margin-top: 15px; overflow: hidden; border: 1px dashed #ced4da; }
        .image-container img { max-width: 100%; max-height: 400px; object-fit: contain; }
        .image-container .placeholder { color: #adb5bd; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="file"] { display: block; width: 100%; }
        .button-group { display: flex; flex-direction: column; gap: 10px; }
        button { width: 100%; padding: 12px; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: background-color 0.2s, opacity 0.2s; background-color: #28a745; }
        button:hover:not(:disabled) { background-color: #218838; }
        button:disabled { background-color: #6c757d; opacity: 0.7; cursor: not-allowed; }
        #results-container { flex-grow: 1; background-color: #212529; color: #f8f9fa; padding: 15px; border-radius: 6px; overflow-x: auto; white-space: pre-wrap; word-wrap: break-word; font-family: "SF Mono", "Fira Code", "Courier New", monospace; min-height: 200px; display: flex; align-items: center; justify-content: center; }
        #status { margin-top: 20px; padding: 12px; border-radius: 6px; font-weight: 500; text-align: center; }
        .status-success { background-color: #d4edda; color: #155724; }
        .status-error { background-color: #f8d7da; color: #721c24; }
        .status-info { background-color: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>

    <h1>玫瑰图智能分析系统</h1>

    <div class="container">
        <!-- 左侧栏：上传和控制 -->
        <div class="panel">
            <h2>1. 控制面板</h2>
            <div class="form-group">
                <label for="image-input">选择玫瑰图图片 (PNG/JPG):</label>
                <input type="file" id="image-input" accept="image/png, image/jpeg">
            </div>
            <div class="form-group">
                <label for="json-input">选择数据文件 (JSON):</label>
                <input type="file" id="json-input" accept="application/json">
            </div>
            <div class="button-group">
                <button id="upload-btn" type="button">上传文件</button>
                <button id="process-btn" type="button" disabled>开始处理</button>
                <button id="evaluate-btn" type="button" disabled>进行评估预测</button>
            </div>
            <div id="status" class="status-info">请选择文件并上传。</div>
            <div class="image-container">
                <img id="preview-img" src="" alt="图片预览" style="display: none;">
                <span id="preview-placeholder" class="placeholder">原始图片预览</span>
            </div>
        </div>

        <!-- 中间栏：处理后图像 -->
        <div class="panel">
            <h2>2. 加密处理后图像</h2>
            <div id="processed-image-container" class="image-container">
                <img id="processed-img" src="" alt="处理后图像" style="display: none;">
                <span id="processed-placeholder" class="placeholder">等待处理结果...</span>
            </div>
        </div>

        <!-- 右侧栏：评估结果 -->
        <div class="panel">
            <h2>3. 评估结果数据</h2>
            <div id="results-container">
                <pre id="results-pre" style="display:none;"></pre>
                <span id="results-placeholder" class="placeholder">等待评估结果...</span>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = "http://127.0.0.1:8000";

        // ... [DOM element selections are the same] ...
        const imageInput = document.getElementById('image-input');
        const jsonInput = document.getElementById('json-input');
        const uploadBtn = document.getElementById('upload-btn');
        const processBtn = document.getElementById('process-btn');
        const evaluateBtn = document.getElementById('evaluate-btn');
        const statusDiv = document.getElementById('status');
        const previewImg = document.getElementById('preview-img');
        const previewPlaceholder = document.getElementById('preview-placeholder');
        const processedImg = document.getElementById('processed-img');
        const processedPlaceholder = document.getElementById('processed-placeholder');
        const resultsPre = document.getElementById('results-pre');
        const resultsPlaceholder = document.getElementById('results-placeholder');

        let chartId = null;

        imageInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                    previewPlaceholder.style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });
        
        function resetProcessingState() {
            processedImg.src = '';
            processedImg.style.display = 'none';
            processedPlaceholder.style.display = 'block';
            resultsPre.textContent = '';
            processBtn.disabled = true;
            evaluateBtn.disabled = true;
        }

        function updateStatus(message, type = 'info') {
            statusDiv.textContent = message;
            statusDiv.className = `status-${type}`;
        }

        // 1. 上传按钮
        uploadBtn.addEventListener('click', async (event) => {
            event.preventDefault(); // <-- 关键修复！
            
            const imageFile = imageInput.files[0];
            const jsonFile = jsonInput.files[0];

            if (!imageFile || !jsonFile) {
                updateStatus('请同时选择图片和JSON文件。', 'error');
                return;
            }
            
            resetProcessingState();
            uploadBtn.disabled = true;
            updateStatus('正在上传文件...', 'info');

            const formData = new FormData();
            formData.append('file', imageFile);
            formData.append('json_data', jsonFile);

            try {
                const response = await fetch(`${API_BASE_URL}/api/upload/`, { method: 'POST', body: formData });
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || `上传失败: ${response.statusText}`);
                }
                const result = await response.json();
                chartId = result.chart_id;
                updateStatus(`上传成功! Chart ID: ${chartId}`, 'success');
                processBtn.disabled = false;
            } catch (error) {
                console.error('上传失败:', error);
                updateStatus(`错误: ${error.message}`, 'error');
            } finally {
                uploadBtn.disabled = false;
            }
        });

        // 2. 开始处理按钮
        processBtn.addEventListener('click', async (event) => {
            event.preventDefault(); // <-- 关键修复！

            if (!chartId) { updateStatus('请先上传文件。', 'error'); return; }

            processBtn.disabled = true;
            evaluateBtn.disabled = true;
            updateStatus('正在加密处理图像...', 'info');

            try {
                const response = await fetch(`${API_BASE_URL}/api/process/?chart_id=${chartId}`, { method: 'POST' });
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || `处理失败: ${response.statusText}`);
                }
                const result = await response.json();
                
                processedImg.src = `${API_BASE_URL}${result.encrypted_image_url}`;
                processedImg.style.display = 'block';
                processedPlaceholder.style.display = 'none';
                
                updateStatus('图像处理成功!', 'success');
                evaluateBtn.disabled = false;
            } catch (error) {
                console.error('处理失败:', error);
                updateStatus(`错误: ${error.message}`, 'error');
                processBtn.disabled = false;
            }
        });
        
        // 3. 评估预测按钮
        evaluateBtn.addEventListener('click', async (event) => {
            event.preventDefault(); // <-- 关键修复！

            if (!chartId) { updateStatus('请先上传并处理文件。', 'error'); return; }

            evaluateBtn.disabled = true;
            updateStatus('正在进行评估...', 'info');

            try {
                const evalResponse = await fetch(`${API_BASE_URL}/api/evaluate/?chart_id=${chartId}`, { method: 'POST' });
                if (!evalResponse.ok) {
                    const errorData = await evalResponse.json();
                    throw new Error(errorData.detail || `评估请求失败: ${evalResponse.statusText}`);
                }
                const evalResult = await evalResponse.json();

                updateStatus('正在获取评估结果...', 'info');
                const resultsResponse = await fetch(`${API_BASE_URL}${evalResult.results_url}`);
                if (!resultsResponse.ok) {
                    const errorData = await resultsResponse.json();
                    throw new Error(errorData.detail || `获取结果失败: ${resultsResponse.statusText}`);
                }
                const resultsData = await resultsResponse.json();

                resultsPre.textContent = JSON.stringify(resultsData, null, 2);
                resultsPre.style.display = 'block';
                resultsPlaceholder.style.display = 'none';
                updateStatus('评估完成!', 'success');
            } catch (error) {
                console.error('评估失败:', error);
                updateStatus(`错误: ${error.message}`, 'error');
            } finally {
                evaluateBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
